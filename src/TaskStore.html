<script>
  var TaskStore = (function () {
    var STATUS_ORDER = { docs: 0, doing: 1, review: 2, todo: 3, pending: 4, done: 5 };

    // =========================================================
    // Init: register entity types and start sync
    // =========================================================
    function init() {
      EntityStore.register("projects", {
        entityType: "project",
        keyPath: "id",
        indexes: [],
        serverFns: { add: "addProject", update: "updateProject", archive: "archiveProject", getContent: "getProjectContent", reorder: "reorderProjects" },
        addServerArgs: function (e) { return [e.id, e.name, e.color || "#4285f4"]; },
      });
      EntityStore.register("cases", {
        entityType: "case",
        keyPath: "id",
        indexes: [{ name: "projectId", keyPath: "projectId", options: { unique: false } }],
        serverFns: { add: "addCase", update: "updateCase", archive: "archiveCase", getContent: "getCaseContent", reorder: "reorderCases" },
        addServerArgs: function (e) { return [e.id, e.projectId, e.name]; },
      });
      EntityStore.register("tasks", {
        entityType: "task",
        keyPath: "id",
        indexes: [
          { name: "projectId", keyPath: "projectId", options: { unique: false } },
          { name: "caseId", keyPath: "caseId", options: { unique: false } },
          { name: "status", keyPath: "status", options: { unique: false } },
        ],
        serverFns: { add: "addTask", update: "updateTask", archive: "archiveTask", getContent: "getTaskContent", reorder: "reorderTasks" },
        addServerArgs: function (e) { return [e.id, e.projectId, e.caseId || "", e.name]; },
        onUpdateHook: function (item, fields) {
          if (fields.status === "done" && item.status !== "done") {
            fields.completedAt = new Date().toISOString();
          } else if (fields.status && fields.status !== "done" && item.status === "done") {
            fields.completedAt = "";
          }
        },
      });

      return EntityStore.init("gas_pomodoro", 3, {
        onUpgrade: function (db) {
          // v2: remove obsolete stores
          if (db.objectStoreNames.contains("contents")) db.deleteObjectStore("contents");
          if (db.objectStoreNames.contains("syncMeta")) db.deleteObjectStore("syncMeta");
        },
      }).then(function () {
        // Phase 2: async server sync (not awaited — UI renders from IDB immediately)
        serverCall("getAllTaskData").then(function (data) {
          return Promise.all([
            EntityStore.mergeServerData("projects", data.projects || []),
            EntityStore.mergeServerData("cases", data.cases || []),
            EntityStore.mergeServerData("tasks", data.tasks || []),
          ]);
        }).then(function () {
          EntityStore.requeueDirtyRecords("projects");
          EntityStore.requeueDirtyRecords("cases");
          EntityStore.requeueDirtyRecords("tasks");
          EntityStore.emit("dataChanged", { entityType: "all", op: "serverSync" });
        }).catch(function (err) {
          console.warn("[TaskStore] server sync failed, using IDB cache:", err);
        });
      });
    }

    // =========================================================
    // CRUD (delegates to EntityStore)
    // =========================================================
    function addProject(name, color) {
      return EntityStore.addEntity("projects", {
        id: crypto.randomUUID(), name: name, color: color || "#4285f4",
      });
    }

    function addCase(projectId, name) {
      return EntityStore.addEntity("cases", {
        id: crypto.randomUUID(), projectId: projectId, name: name,
      });
    }

    function addTask(projectId, caseId, name) {
      return EntityStore.addEntity("tasks", {
        id: crypto.randomUUID(), projectId: projectId, caseId: caseId || "",
        name: name, status: "todo", completedAt: "", startedAt: "", dueDate: "",
      });
    }

    function updateProject(id, fields) {
      return EntityStore.updateEntityFields("projects", id, fields);
    }

    function updateCase(id, fields) {
      return EntityStore.updateEntityFields("cases", id, fields);
    }

    function updateTask(id, fields) {
      return EntityStore.updateEntityFields("tasks", id, fields);
    }

    // =========================================================
    // Archive (with cascading for project/case)
    // =========================================================
    function archiveProject(id) {
      return EntityStore.setInactive("projects", id)
        .then(function () {
          return EntityStore.getByIndex("cases", "projectId", id).then(function (cases) {
            return Promise.all(cases.map(function (c) {
              return EntityStore.setInactive("cases", c.id);
            }));
          });
        })
        .then(function () {
          return EntityStore.getByIndex("tasks", "projectId", id).then(function (tasks) {
            return Promise.all(tasks.map(function (t) {
              return EntityStore.setInactive("tasks", t.id);
            }));
          });
        })
        .then(function () {
          EntityStore.emit("dataChanged", { entityType: "project", op: "archive", id: id });
          EntityStore.syncArchiveToServer("projects", id);
        });
    }

    function archiveCase(id) {
      return EntityStore.setInactive("cases", id)
        .then(function () {
          return EntityStore.getByIndex("tasks", "caseId", id).then(function (tasks) {
            return Promise.all(tasks.map(function (t) {
              return EntityStore.setInactive("tasks", t.id);
            }));
          });
        })
        .then(function () {
          EntityStore.emit("dataChanged", { entityType: "case", op: "archive", id: id });
          EntityStore.syncArchiveToServer("cases", id);
        });
    }

    function archiveTask(id) {
      return EntityStore.archiveEntity("tasks", id);
    }

    // =========================================================
    // Query helpers
    // =========================================================
    function getProjects() {
      return EntityStore.getAll("projects").then(function (items) {
        return items
          .filter(function (p) { return p.isActive !== false; })
          .sort(function (a, b) { return (a.sortOrder || 0) - (b.sortOrder || 0); });
      });
    }

    function getCases(projectId) {
      return EntityStore.getByIndex("cases", "projectId", projectId).then(function (items) {
        return items
          .filter(function (c) { return c.isActive !== false; })
          .sort(function (a, b) { return (a.sortOrder || 0) - (b.sortOrder || 0); });
      });
    }

    function getTasks(projectId, caseId) {
      var indexName = caseId ? "caseId" : "projectId";
      var indexVal = caseId || projectId;
      return EntityStore.getByIndex("tasks", indexName, indexVal).then(function (items) {
        return items
          .filter(function (t) {
            if (t.isActive === false) return false;
            if (caseId) return true;
            return !t.caseId;
          })
          .sort(function (a, b) {
            var sa = STATUS_ORDER[a.status] !== undefined ? STATUS_ORDER[a.status] : 99;
            var sb = STATUS_ORDER[b.status] !== undefined ? STATUS_ORDER[b.status] : 99;
            if (sa !== sb) return sa - sb;
            return (a.createdAt || "").localeCompare(b.createdAt || "");
          });
      });
    }

    function getAllProjects() { return getProjects(); }
    function getAllCases() {
      return EntityStore.getAll("cases").then(function (items) {
        return items.filter(function (c) { return c.isActive !== false; });
      });
    }
    function getAllTasks() {
      return EntityStore.getAll("tasks").then(function (items) {
        return items.filter(function (t) { return t.isActive !== false; });
      });
    }

    // =========================================================
    // Reorder
    // =========================================================
    function reorderProjects(orderedIds) {
      var entries = orderedIds.map(function (id, i) { return { id: id, sortOrder: i + 1 }; });
      return EntityStore.updateSortOrders("projects", entries).then(function () {
        EntityStore.emit("dataChanged", { entityType: "project", op: "reorder" });
        EntityStore.scheduleReorderSync("projects", [orderedIds]);
      });
    }

    function reorderCases(projectId, orderedIds) {
      var entries = orderedIds.map(function (id, i) { return { id: id, sortOrder: i + 1 }; });
      return EntityStore.updateSortOrders("cases", entries).then(function () {
        EntityStore.emit("dataChanged", { entityType: "case", op: "reorder" });
        EntityStore.scheduleReorderSync("cases", [projectId, orderedIds]);
      });
    }

    function reorderTasks(parentId, orderedIds) {
      var entries = orderedIds.map(function (id, i) { return { id: id, sortOrder: i + 1 }; });
      return EntityStore.updateSortOrders("tasks", entries).then(function () {
        EntityStore.emit("dataChanged", { entityType: "task", op: "reorder" });
        EntityStore.scheduleReorderSync("tasks", [parentId, orderedIds]);
      });
    }

    // =========================================================
    // Content (adapt parameter order for backward compat)
    // =========================================================
    function saveContent(id, content, storeName) {
      return EntityStore.saveContent(storeName, id, content);
    }

    function getContent(id, storeName) {
      return EntityStore.getContent(storeName, id);
    }

    function resolveWithServer(id, storeName) {
      return EntityStore.resolveWithServer(storeName, id);
    }

    function flushContentSync(storeName, id) {
      EntityStore.flushContentSync(storeName, id);
    }

    // =========================================================
    // Public API (backward compatible)
    // =========================================================
    return {
      init: init,
      on: EntityStore.on,
      getProjects: getProjects,
      getCases: getCases,
      getTasks: getTasks,
      getAllProjects: getAllProjects,
      getAllCases: getAllCases,
      getAllTasks: getAllTasks,
      addProject: addProject,
      addCase: addCase,
      addTask: addTask,
      updateProject: updateProject,
      updateCase: updateCase,
      updateTask: updateTask,
      archiveProject: archiveProject,
      archiveCase: archiveCase,
      archiveTask: archiveTask,
      reorderProjects: reorderProjects,
      reorderCases: reorderCases,
      reorderTasks: reorderTasks,
      saveContent: saveContent,
      getContent: getContent,
      withLock: EntityStore.withLock,
      rawGet: EntityStore.get,
      get: EntityStore.get,
      put: EntityStore.put,
      updateEntity: EntityStore.updateEntityRaw,
      updateSortOrders: EntityStore.updateSortOrders,
      flushContentSync: flushContentSync,
      flushAllSyncs: EntityStore.flushAllSyncs,
      resolveWithServer: resolveWithServer,
    };
  })();
</script>
