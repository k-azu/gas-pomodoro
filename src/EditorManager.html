<script>
  var EditorManager = (function () {
    // =========================================================
    // Drive image proxy: IndexedDB cache + pre-resolve
    // =========================================================
    var DRIVE_FILE_RE = /drive\.google\.com\/file\/d\/([^/]+)\/view/;
    var DRIVE_URL_GLOBAL_RE = /https:\/\/drive\.google\.com\/file\/d\/([^/\s)"]+)\/view/g;
    var blobToDriveUrl = {}; // blobUrl -> driveFileUrl
    var fileIdToBlobUrl = {}; // fileId -> blobUrl

    function driveFileUrl(fileId) {
      return "https://drive.google.com/file/d/" + fileId + "/view";
    }

    function blobUrlsToDrive(md) {
      for (var blobUrl in blobToDriveUrl) {
        md = md.split(blobUrl).join(blobToDriveUrl[blobUrl]);
      }
      return md;
    }

    // --- IndexedDB cache ---
    var IMG_DB_NAME = "gas_pomodoro_images";
    var IMG_DB_VERSION = 1;
    var IMG_STORE_NAME = "images";
    var _imgDbInstance = null;

    function openImageDB() {
      if (_imgDbInstance) return Promise.resolve(_imgDbInstance);
      return new Promise(function (resolve, reject) {
        var req = indexedDB.open(IMG_DB_NAME, IMG_DB_VERSION);
        req.onupgradeneeded = function () {
          req.result.createObjectStore(IMG_STORE_NAME);
        };
        req.onsuccess = function () { _imgDbInstance = req.result; resolve(_imgDbInstance); };
        req.onerror = function () { reject(req.error); };
      });
    }

    function getCachedImage(fileId) {
      return openImageDB().then(function (db) {
        return new Promise(function (resolve, reject) {
          var tx = db.transaction(IMG_STORE_NAME, "readonly");
          var req = tx.objectStore(IMG_STORE_NAME).get(fileId);
          req.onsuccess = function () { resolve(req.result || null); };
          req.onerror = function () { reject(req.error); };
        });
      });
    }

    function setCachedImage(fileId, blob) {
      return openImageDB().then(function (db) {
        return new Promise(function (resolve, reject) {
          var tx = db.transaction(IMG_STORE_NAME, "readwrite");
          tx.objectStore(IMG_STORE_NAME).put(blob, fileId);
          tx.oncomplete = function () { resolve(); };
          tx.onerror = function () { reject(tx.error); };
        });
      });
    }

    // --- Resolve helpers ---
    function base64ToBlob(base64, mimeType) {
      var byteChars = atob(base64);
      var bytes = new Uint8Array(byteChars.length);
      for (var i = 0; i < byteChars.length; i++) bytes[i] = byteChars.charCodeAt(i);
      return new Blob([bytes], { type: mimeType });
    }

    function registerBlobUrl(fileId, blobUrl) {
      fileIdToBlobUrl[fileId] = blobUrl;
      blobToDriveUrl[blobUrl] = driveFileUrl(fileId);
      return blobUrl;
    }

    function resolveFileId(fileId) {
      if (fileIdToBlobUrl[fileId]) return Promise.resolve(fileIdToBlobUrl[fileId]);
      return getCachedImage(fileId).then(function (cached) {
        if (cached) {
          return registerBlobUrl(fileId, URL.createObjectURL(cached));
        }
        return serverCall("getImageBase64", fileId).then(function (result) {
          var blob = base64ToBlob(result.base64, result.mimeType);
          setCachedImage(fileId, blob);
          return registerBlobUrl(fileId, URL.createObjectURL(blob));
        });
      }).catch(function (err) {
        console.error("画像の解決に失敗:", fileId, err);
        return driveFileUrl(fileId);
      });
    }

    function resolveDriveUrls(md) {
      if (!md) return Promise.resolve(md);
      var ids = {};
      var match;
      DRIVE_URL_GLOBAL_RE.lastIndex = 0;
      while ((match = DRIVE_URL_GLOBAL_RE.exec(md)) !== null) {
        ids[match[1]] = match[0];
      }
      var keys = Object.keys(ids);
      if (keys.length === 0) return Promise.resolve(md);
      return Promise.all(keys.map(function (fileId) {
        return resolveFileId(fileId).then(function (blobUrl) {
          return { driveUrl: ids[fileId], blobUrl: blobUrl };
        });
      })).then(function (results) {
        results.forEach(function (r) {
          md = md.split(r.driveUrl).join(r.blobUrl);
        });
        return md;
      });
    }

    // =========================================================
    // Image upload
    // =========================================================
    var MAX_CLIENT_BYTES = 10 * 1024 * 1024;

    function handleImageUpload(file) {
      if (file.size > MAX_CLIENT_BYTES) {
        var sizeMB = (file.size / 1024 / 1024).toFixed(1);
        return Promise.reject(new Error("画像サイズが上限(10MB)を超えています: " + sizeMB + "MB"));
      }
      var mimeType = file.type || "image/jpeg";
      var ext = {"image/jpeg":"jpg","image/png":"png","image/gif":"gif","image/webp":"webp"}[mimeType] || "jpg";
      var now = new Date();
      var ts = now.getFullYear()
        + ("0"+(now.getMonth()+1)).slice(-2)
        + ("0"+now.getDate()).slice(-2)
        + "_"
        + ("0"+now.getHours()).slice(-2)
        + ("0"+now.getMinutes()).slice(-2)
        + ("0"+now.getSeconds()).slice(-2);
      var uploadName = "pomodoro_" + ts + "." + ext;

      return new Promise(function (resolve, reject) {
        var reader = new FileReader();
        reader.onload = function () {
          var base64 = reader.result.split(",")[1];
          serverCall("uploadImage", base64, uploadName, mimeType)
            .then(function (result) {
              var blob = new Blob([file], { type: mimeType });
              var blobUrl = URL.createObjectURL(blob);
              registerBlobUrl(result.fileId, blobUrl);
              setCachedImage(result.fileId, blob);
              resolve(blobUrl);
            })
            .catch(reject);
        };
        reader.onerror = function () {
          reject(new Error("ファイルの読み込みに失敗しました"));
        };
        reader.readAsDataURL(file);
      });
    }

    // =========================================================
    // Mention config (shared across all editors)
    // =========================================================
    var _mentionsConfig = null;
    var _navigateBack = null;
    var _navStack = [];

    function setMentionConfig(config) {
      _mentionsConfig = config;
    }

    function getMentionsConfig() {
      return _mentionsConfig;
    }

    function pushNavStack(entry) {
      _navStack.push(entry);
      history.pushState({ mentionNav: true }, "");
      updateBackButton();
    }

    function navigateBack() {
      if (_navStack.length === 0) return;
      var prev = _navStack.pop();
      if (typeof TabPanel !== "undefined") TabPanel.switchTab(prev.tab);
      if (prev.memoId && prev.tab === "memo" && typeof MemoTab !== "undefined") {
        MemoTab.selectMemo(prev.memoId);
      }
      if (prev.taskNode && prev.tab === "task" && typeof TaskTab !== "undefined") {
        TaskTab.selectNode(prev.taskNode.type, prev.taskNode.id);
      }
      updateBackButton();
    }

    function updateBackButton() {
      var btn = document.getElementById("memo-back-btn");
      if (btn) btn.style.display = _navStack.length > 0 ? "" : "none";
    }

    function getNavStackLength() {
      return _navStack.length;
    }

    // =========================================================
    // Normalizer
    // =========================================================
    function normalizeEmpty(val) {
      if (!val) return "";
      if (!val.replace(/&nbsp;/g, "").replace(/[\s\u00a0]/g, "")) return "";
      return val;
    }

    // =========================================================
    // localStorage helpers
    // =========================================================
    function ls(key) {
      try { return localStorage.getItem(key) || ""; } catch (e) { return ""; }
    }
    function lsSet(key, val) {
      try { localStorage.setItem(key, val); } catch (e) {}
    }

    // =========================================================
    // Editor factory: create(opts) → instance
    // =========================================================
    // Types:
    //   persistent: EntityStore-backed (IDB→server), supports switchDocument
    //   ephemeral: localStorage-backed, no doc switching
    //   transient: no persistence, display/edit only

    function create(opts) {
      var type = opts.type || "transient";
      var regName = opts.regName || null;   // EntityStore registration name (persistent)
      var storageKey = opts.storageKey || null; // localStorage key (ephemeral)
      var saveDebounceMs = opts.saveDebounceMs || 500;
      var placeholder = opts.placeholder || "";

      var editorRef = null;
      var container = null;
      var debounceTimer = null;
      var scrollCache = {};
      var currentDocId = null;
      var _suppressOnChange = false;
      var _userHasEdited = false;
      var _resolvedDocs = {};
      var _retryBanner = null;

      function mount(targetContainer) {
        if (container) return container;
        if (typeof window.mountMemoEditor !== "function") {
          console.warn("EditorManager: mountMemoEditor not available");
          return null;
        }

        container = targetContainer || document.createElement("div");

        var initValue = "";
        if (type === "ephemeral" && storageKey) {
          initValue = ls(storageKey);
        }

        var mountPromise = resolveDriveUrls(initValue).then(function (resolved) {
          var editorOpts = {
            initialValue: resolved,
            onChange: function (md) {
              if (_suppressOnChange) return;
              internalOnChange(md);
            },
            onImageUpload: handleImageUpload,
            placeholder: placeholder,
            defaultMode: "wysiwyg",
            style: { height: "100%" },
          };
          if (_mentionsConfig) editorOpts.mentions = _mentionsConfig;
          if (type === "persistent" && currentDocId) {
            editorOpts.initialDocumentId = currentDocId;
          }
          editorRef = window.mountMemoEditor(container, editorOpts);
        });

        // Store the mount promise for callers that need to wait
        container._mountPromise = mountPromise;
        return container;
      }

      function internalOnChange(md) {
        _userHasEdited = true;
        if (debounceTimer) clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function () {
          debounceTimer = null;
          doSave(md);
        }, saveDebounceMs);
      }

      function doSave(md) {
        var cleanMd = blobUrlsToDrive(md);
        if (type === "persistent" && regName && currentDocId) {
          EntityStore.saveContent(regName, currentDocId, cleanMd);
        } else if (type === "ephemeral" && storageKey) {
          lsSet(storageKey, cleanMd);
        }
      }

      function getValue() {
        if (editorRef) return blobUrlsToDrive(normalizeEmpty(editorRef.getValue()));
        if (type === "ephemeral" && storageKey) return ls(storageKey);
        return "";
      }

      function setValue(markdown) {
        if (!editorRef) return Promise.resolve();
        return resolveDriveUrls(markdown).then(function (resolved) {
          if (editorRef.getValue() === resolved) return;
          editorRef.setValue(resolved);
        });
      }

      function clear() {
        if (editorRef) editorRef.setValue("");
        if (type === "ephemeral" && storageKey) lsSet(storageKey, "");
      }

      function setEditable(editable) {
        if (editorRef && editorRef.setEditable) editorRef.setEditable(editable);
      }

      function getContainer() {
        return container;
      }

      function isReady() {
        return !!editorRef;
      }

      function getEditorRef() {
        return editorRef;
      }

      function flushSave() {
        if (debounceTimer) {
          clearTimeout(debounceTimer);
          debounceTimer = null;
        }
        if (!editorRef || !_userHasEdited) return;
        var md = editorRef.getValue();
        if (md != null) doSave(md);
      }

      // --- Scroll cache ---
      function getScrollEl() {
        if (!container) return null;
        return container.querySelector(".mdg-editor-content") || null;
      }

      function saveScroll() {
        if (!currentDocId) return;
        if (!container || !container.isConnected) return;
        var el = getScrollEl();
        if (el) scrollCache[currentDocId] = el.scrollTop;
      }

      function restoreScroll(docId) {
        var pos = scrollCache[docId];
        if (pos == null) return;
        setTimeout(function () {
          var el = getScrollEl();
          if (el) el.scrollTop = pos;
        }, 0);
      }

      // --- Persistent: document switching ---
      function switchDocument(docId) {
        if (type !== "persistent") return Promise.resolve();
        if (!editorRef) {
          currentDocId = docId;
          return Promise.resolve();
        }

        // Same document — just restore scroll
        if (currentDocId === docId) {
          restoreScroll(docId);
          return Promise.resolve();
        }

        // Save current doc state
        saveScroll();
        flushSave();
        _suppressOnChange = true;
        _userHasEdited = false;

        var prevDocId = currentDocId;
        currentDocId = docId;

        // Cache hit: editor has this document AND it was fully resolved
        if (_resolvedDocs[docId] && editorRef.hasDocument && editorRef.hasDocument(docId)) {
          editorRef.switchDocument(docId, "");
          restoreScroll(docId);
          editorRef.setEditable(true);
          var hitId = docId;
          setTimeout(function () {
            if (currentDocId === hitId) _suppressOnChange = false;
          }, 0);
          return Promise.resolve();
        }

        // Cache miss: switch with empty, then load content
        editorRef.setEditable(false);
        editorRef.switchDocument(docId, "");

        var loadId = docId;
        var idbP = EntityStore.getContent(regName, loadId);
        var srvP = EntityStore.resolveWithServer(regName, loadId).catch(function () { return null; });

        return Promise.all([idbP, srvP]).then(function (results) {
          if (currentDocId !== loadId) return;
          var idbContent = results[0] || "";
          var resolution = results[1];
          var finalContent = idbContent;
          if (resolution && resolution.useServer) {
            finalContent = resolution.content || "";
          }

          return new Promise(function (resolve) {
            setTimeout(function () {
              if (currentDocId !== loadId) { resolve(); return; }
              resolveDriveUrls(finalContent).then(function (resolved) {
                if (currentDocId !== loadId) { resolve(); return; }
                editorRef.setValue(resolved);
                restoreScroll(loadId);

                if (resolution === null && !finalContent.trim()) {
                  showRetryBanner(loadId);
                } else {
                  _resolvedDocs[loadId] = true;
                  hideRetryBanner();
                  editorRef.setEditable(true);
                }
                setTimeout(function () {
                  if (currentDocId === loadId) _suppressOnChange = false;
                }, 0);
                resolve();
              });
            }, 0);
          });
        });
      }

      function setRegName(newRegName) {
        regName = newRegName;
      }

      function getCurrentDocId() {
        return currentDocId;
      }

      // --- Persistent: initial mount with pre-resolved content ---
      function mountWithContent(targetContainer, docId, storeName) {
        if (container) return Promise.resolve();
        if (typeof window.mountMemoEditor !== "function") return Promise.resolve();

        currentDocId = docId;
        regName = storeName;
        _userHasEdited = false;

        var idbP = EntityStore.getContent(storeName, docId);
        var srvP = EntityStore.resolveWithServer(storeName, docId).catch(function () { return null; });

        return Promise.all([idbP, srvP]).then(function (results) {
          if (currentDocId !== docId) return;
          var idbContent = results[0] || "";
          var resolution = results[1];
          var content = idbContent;
          if (resolution && resolution.useServer) {
            content = resolution.content || "";
          }

          return resolveDriveUrls(content).then(function (resolved) {
            if (currentDocId !== docId) return;

            container = targetContainer || document.createElement("div");
            var editorOpts = {
              initialValue: resolved,
              initialDocumentId: docId,
              onChange: function (md) {
                if (_suppressOnChange) return;
                internalOnChange(md);
              },
              onImageUpload: handleImageUpload,
              placeholder: placeholder,
              defaultMode: "wysiwyg",
              style: { height: "100%" },
            };
            if (_mentionsConfig) editorOpts.mentions = _mentionsConfig;
            editorRef = window.mountMemoEditor(container, editorOpts);

            if (resolution === null && !content.trim()) {
              editorRef.setEditable(false);
              showRetryBanner(docId);
            } else {
              _resolvedDocs[docId] = true;
              editorRef.setEditable(true);
            }
          });
        });
      }

      // --- Retry banner ---
      function showRetryBanner(docId) {
        hideRetryBanner();
        if (!container) return;
        _retryBanner = document.createElement("div");
        _retryBanner.style.cssText = "padding:10px 14px;background:#fff3cd;border:1px solid #ffc107;border-radius:4px;display:flex;align-items:center;gap:8px;font-size:13px;margin:8px;";
        var msg = document.createElement("span");
        msg.textContent = "コンテンツの読み込みに失敗しました";
        var btn = document.createElement("button");
        btn.textContent = "再試行";
        btn.style.cssText = "padding:4px 12px;border:1px solid #ddd;border-radius:4px;background:white;cursor:pointer;font-size:13px;";
        btn.addEventListener("click", function () {
          btn.disabled = true;
          btn.textContent = "読み込み中...";
          EntityStore.resolveWithServer(regName, docId).then(function (resolution) {
            if (currentDocId !== docId) { hideRetryBanner(); return; }
            if (resolution && resolution.useServer) {
              editorRef.setValue(resolution.content || "");
            }
            var val = (editorRef.getValue ? editorRef.getValue() : "") || "";
            if (resolution === null && !val.trim()) {
              btn.disabled = false;
              btn.textContent = "再試行";
              return;
            }
            hideRetryBanner();
            _resolvedDocs[docId] = true;
            editorRef.setEditable(true);
          });
        });
        _retryBanner.appendChild(msg);
        _retryBanner.appendChild(btn);
        container.parentNode && container.parentNode.appendChild(_retryBanner);
      }

      function hideRetryBanner() {
        if (_retryBanner && _retryBanner.parentNode) {
          _retryBanner.parentNode.removeChild(_retryBanner);
        }
        _retryBanner = null;
      }

      // --- Flush pending content to server ---
      function flushContentSync() {
        if (type === "persistent" && regName && currentDocId) {
          EntityStore.flushContentSync(regName, currentDocId);
        }
      }

      return {
        mount: mount,
        getValue: getValue,
        setValue: setValue,
        clear: clear,
        setEditable: setEditable,
        getContainer: getContainer,
        isReady: isReady,
        getEditorRef: getEditorRef,
        flushSave: flushSave,
        flushContentSync: flushContentSync,
        switchDocument: switchDocument,
        setRegName: setRegName,
        getCurrentDocId: getCurrentDocId,
        mountWithContent: mountWithContent,
        saveScroll: saveScroll,
        restoreScroll: restoreScroll,
      };
    }

    // =========================================================
    // Open original Drive image on double-click (global handler)
    // =========================================================
    var _dblclickBound = false;
    function bindDblclick() {
      if (_dblclickBound) return;
      _dblclickBound = true;
      document.addEventListener("dblclick", function (e) {
        var img = e.target;
        if (img.tagName !== "IMG") return;
        var dUrl = blobToDriveUrl[img.src];
        if (dUrl) window.open(dUrl, "_blank");
      });
    }

    // Bind popstate for mention navigation
    window.addEventListener("popstate", function () {
      if (_navStack.length > 0) {
        navigateBack();
      }
    });

    // =========================================================
    // Public API
    // =========================================================
    return {
      create: create,
      blobUrlsToDrive: blobUrlsToDrive,
      resolveDriveUrls: resolveDriveUrls,
      handleImageUpload: handleImageUpload,
      setMentionConfig: setMentionConfig,
      getMentionsConfig: getMentionsConfig,
      navigateBack: navigateBack,
      pushNavStack: pushNavStack,
      getNavStackLength: getNavStackLength,
      updateBackButton: updateBackButton,
      bindDblclick: bindDblclick,
    };
  })();
</script>
