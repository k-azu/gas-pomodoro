<script>
  var MemoStore = (function () {
    var memoTags = [];
    var _serverMemos = null;

    // =========================================================
    // Init: register "memos" entity type (call BEFORE EntityStore.init)
    // =========================================================
    function init(serverMemos, serverMemoTags) {
      memoTags = serverMemoTags || [];
      _serverMemos = serverMemos;

      EntityStore.register("memos", {
        entityType: "memo",
        keyPath: "id",
        indexes: [],
        serverFns: {
          add: "saveMemo",
          archive: "deleteMemo",
          getContent: "getMemoContent",
          reorder: "updateMemoSortOrders",
        },
        addServerArgs: function (e) {
          return [{ id: e.id, name: e.name, content: "", tags: e.tags || [] }];
        },
        // saveMemoContent uses 3 args (id, content, updatedAt) — custom sync function
        contentSyncFn: function (id, content) {
          return serverCall("saveMemoContent", id, content, new Date().toISOString());
        },
      });
    }

    // =========================================================
    // Load data: merge server data into IDB + migrate localStorage
    // (call AFTER EntityStore.init)
    // =========================================================
    function loadData() {
      var serverMemos = _serverMemos || [];
      _serverMemos = null;
      return EntityStore.mergeServerData("memos", serverMemos).then(function () {
        EntityStore.requeueDirtyRecords("memos");
        return migrateFromLocalStorage(serverMemos);
      });
    }

    // =========================================================
    // localStorage → IDB migration (one-time, idempotent)
    // =========================================================
    var LS_CONTENT_PREFIX = "gas_pomodoro_memo_";
    var LS_TS_PREFIX = "gas_pomodoro_memo_ts_";
    var LS_SYNCED_PREFIX = "gas_pomodoro_memo_synced_";

    function migrateFromLocalStorage(serverMemos) {
      var memoIds = serverMemos.map(function (m) { return m.id; });
      if (memoIds.length === 0) return Promise.resolve();

      var ops = [];
      memoIds.forEach(function (id) {
        var lsContent = null;
        try { lsContent = localStorage.getItem(LS_CONTENT_PREFIX + id); } catch (e) {}
        if (!lsContent) return;

        ops.push(
          EntityStore.getContent("memos", id).then(function (idbContent) {
            if (idbContent) return; // IDB already has content, skip
            return EntityStore.saveContent("memos", id, lsContent).then(function () {
              console.log("[MemoStore] Migrated memo from localStorage:", id);
            });
          }).then(function () {
            // Clean up localStorage keys
            try {
              localStorage.removeItem(LS_CONTENT_PREFIX + id);
              localStorage.removeItem(LS_TS_PREFIX + id);
              localStorage.removeItem(LS_SYNCED_PREFIX + id);
            } catch (e) {}
          })
        );
      });

      return Promise.all(ops).catch(function (err) {
        console.warn("[MemoStore] localStorage migration error:", err);
      });
    }

    // =========================================================
    // Query helpers
    // =========================================================
    function getMemos() {
      return EntityStore.getAll("memos").then(function (items) {
        return items
          .filter(function (m) { return m.isActive !== false; })
          .sort(function (a, b) { return (a.sortOrder || 0) - (b.sortOrder || 0); });
      });
    }

    function getMemo(id) {
      return EntityStore.get("memos", id);
    }

    // =========================================================
    // CRUD
    // =========================================================
    function addMemo(name) {
      return EntityStore.addEntity("memos", {
        id: crypto.randomUUID(),
        name: name,
        tags: [],
      });
    }

    function renameMemo(id, name) {
      serverCall("renameMemo", id, name).catch(function () {});
      return EntityStore.updateEntityFields("memos", id, { name: name });
    }

    function deleteMemo(id) {
      return EntityStore.archiveEntity("memos", id);
    }

    function reorderMemos(orderedIds) {
      var entries = orderedIds.map(function (id, i) { return { id: id, sortOrder: i + 1 }; });
      return EntityStore.updateSortOrders("memos", entries).then(function () {
        EntityStore.emit("dataChanged", { entityType: "memo", op: "reorder" });
        EntityStore.scheduleReorderSync("memos", [orderedIds]);
      });
    }

    // =========================================================
    // Tag management (memo-specific, not in EntityStore)
    // =========================================================
    function updateTags(id, tags) {
      serverCall("updateMemoTags", id, tags).catch(function () {});
      return EntityStore.updateEntityFields("memos", id, { tags: tags });
    }

    function addTag(name, color) {
      var c = color || "#757575";
      var existing = memoTags.find(function (t) { return t.name === name; });
      if (existing) return;
      memoTags.push({ name: name, color: c, sortOrder: memoTags.length + 1, isActive: true });
      serverCall("addMemoTag", name, c).catch(function () {});
    }

    function updateTagColor(name, color) {
      var tag = memoTags.find(function (t) { return t.name === name; });
      if (tag) tag.color = color;
      serverCall("updateMemoTagColor", name, color).catch(function () {});
    }

    function getTags() {
      return memoTags;
    }

    // =========================================================
    // Content (backward compat wrappers)
    // =========================================================
    function saveContent(id, content) {
      return EntityStore.saveContent("memos", id, content);
    }

    function getContent(id) {
      return EntityStore.getContent("memos", id);
    }

    function resolveWithServer(id) {
      return EntityStore.resolveWithServer("memos", id);
    }

    function flushContentSync(id) {
      EntityStore.flushContentSync("memos", id);
    }

    // =========================================================
    // Public API
    // =========================================================
    return {
      init: init,
      loadData: loadData,
      getMemos: getMemos,
      getMemo: getMemo,
      addMemo: addMemo,
      renameMemo: renameMemo,
      deleteMemo: deleteMemo,
      reorderMemos: reorderMemos,
      updateTags: updateTags,
      addTag: addTag,
      updateTagColor: updateTagColor,
      getTags: getTags,
      saveContent: saveContent,
      getContent: getContent,
      resolveWithServer: resolveWithServer,
      flushContentSync: flushContentSync,
    };
  })();
</script>
