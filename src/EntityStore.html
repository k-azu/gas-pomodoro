<script>
  var EntityStore = (function () {
    var _db = null;
    var _dbName = null;
    var _dbVersion = null;
    var _onUpgrade = null;
    var _listeners = {};
    var _entityStoreMap = {};      // id -> storeName
    var _registrations = {};        // storeName -> config
    var _metaDebounces = {};
    var _contentSyncDebounces = {};
    var _reorderState = {};
    var _reorderDebounces = {};
    var _pendingServerContent = {}; // id -> { content, serverTs }
    var _pendingOps = {};

    // =========================================================
    // Per-ID operation lock (serializes read-modify-write)
    // =========================================================
    function withLock(id, fn) {
      var prev = _pendingOps[id] || Promise.resolve();
      var next = prev.then(fn, fn);
      _pendingOps[id] = next;
      next.then(function () {
        if (_pendingOps[id] === next) delete _pendingOps[id];
      });
      return next;
    }

    // =========================================================
    // Registration & Init
    // =========================================================
    function register(storeName, config) {
      config.storeName = storeName;
      _registrations[storeName] = config;
      _reorderState[storeName] = { pending: null, saving: false };
    }

    function init(dbName, dbVersion, opts) {
      _dbName = dbName;
      _dbVersion = dbVersion;
      _onUpgrade = opts && opts.onUpgrade;
      return openDB().then(function () {
        window.addEventListener("beforeunload", flushAllSyncs);
        document.addEventListener("visibilitychange", function () {
          if (document.visibilityState === "hidden") flushAllSyncs();
        });
      });
    }

    // =========================================================
    // IndexedDB Setup
    // =========================================================
    function openDB() {
      if (_db) return Promise.resolve(_db);
      return new Promise(function (resolve, reject) {
        var req;
        try {
          req = indexedDB.open(_dbName, _dbVersion);
        } catch (e) {
          console.error("[EntityStore] indexedDB.open threw:", e);
          reject(e);
          return;
        }
        req.onupgradeneeded = function (event) {
          var db = req.result;
          Object.keys(_registrations).forEach(function (storeName) {
            var cfg = _registrations[storeName];
            if (!db.objectStoreNames.contains(storeName)) {
              var store = db.createObjectStore(storeName, { keyPath: cfg.keyPath || "id" });
              (cfg.indexes || []).forEach(function (idx) {
                store.createIndex(idx.name, idx.keyPath, idx.options || { unique: false });
              });
            }
          });
          if (_onUpgrade) _onUpgrade(db, event.oldVersion, event.newVersion);
        };
        req.onsuccess = function () {
          _db = req.result;
          console.log("[EntityStore] IndexedDB opened successfully");
          resolve(_db);
        };
        req.onerror = function () {
          console.error("[EntityStore] IndexedDB open failed:", req.error);
          reject(req.error);
        };
        req.onblocked = function () {
          console.warn("[EntityStore] IndexedDB open blocked (another connection open?)");
        };
      });
    }

    // =========================================================
    // Core DB functions
    // =========================================================
    function getAll(storeName) {
      return openDB().then(function (db) {
        return new Promise(function (resolve, reject) {
          var tx = db.transaction(storeName, "readonly");
          var req = tx.objectStore(storeName).getAll();
          req.onsuccess = function () { resolve(req.result); };
          req.onerror = function () { reject(req.error); };
        });
      });
    }

    function get(storeName, id) {
      return openDB().then(function (db) {
        return new Promise(function (resolve, reject) {
          var tx = db.transaction(storeName, "readonly");
          var req = tx.objectStore(storeName).get(id);
          req.onsuccess = function () { resolve(req.result || null); };
          req.onerror = function () {
            console.error("[EntityStore] get failed:", storeName, id, req.error);
            reject(req.error);
          };
        });
      });
    }

    function put(storeName, data) {
      return openDB().then(function (db) {
        return new Promise(function (resolve, reject) {
          var tx = db.transaction(storeName, "readwrite");
          tx.objectStore(storeName).put(data);
          tx.oncomplete = function () { resolve(); };
          tx.onerror = function () {
            console.error("[EntityStore] put failed:", storeName, data && data.id, tx.error);
            reject(tx.error);
          };
        });
      });
    }

    function remove(storeName, id) {
      return openDB().then(function (db) {
        return new Promise(function (resolve, reject) {
          var tx = db.transaction(storeName, "readwrite");
          tx.objectStore(storeName).delete(id);
          tx.oncomplete = function () { resolve(); };
          tx.onerror = function () { reject(tx.error); };
        });
      });
    }

    function getByIndex(storeName, indexName, val) {
      return openDB().then(function (db) {
        return new Promise(function (resolve, reject) {
          var tx = db.transaction(storeName, "readonly");
          var idx = tx.objectStore(storeName).index(indexName);
          var req = idx.getAll(val);
          req.onsuccess = function () { resolve(req.result); };
          req.onerror = function () { reject(req.error); };
        });
      });
    }

    // =========================================================
    // Event System
    // =========================================================
    function on(event, cb) {
      if (!_listeners[event]) _listeners[event] = [];
      _listeners[event].push(cb);
    }

    function emit(event, data) {
      var cbs = _listeners[event] || [];
      cbs.forEach(function (cb) {
        try { cb(data); } catch (e) { console.error("EntityStore event error:", e); }
      });
    }

    // =========================================================
    // Generic CRUD
    // =========================================================
    function addEntity(storeName, entityData) {
      var now = new Date().toISOString();
      var item = {
        sortOrder: Date.now(),
        isActive: true,
        createdAt: now,
        updatedAt: now,
        content: "",
        _dirty: true,
        _pendingCreate: true,
      };
      Object.keys(entityData).forEach(function (k) { item[k] = entityData[k]; });
      _entityStoreMap[item.id] = storeName;
      return put(storeName, item).then(function () {
        var cfg = _registrations[storeName];
        emit("dataChanged", { entityType: cfg.entityType || storeName, op: "add", id: item.id });
        syncCreateToServer(storeName, item.id);
        return item.id;
      });
    }

    function updateEntityFields(storeName, id, fields) {
      _entityStoreMap[id] = storeName;
      return withLock(id, function () {
        return get(storeName, id).then(function (item) {
          if (!item) return;
          var cfg = _registrations[storeName];
          if (cfg && cfg.onUpdateHook) cfg.onUpdateHook(item, fields);
          Object.keys(fields).forEach(function (k) { item[k] = fields[k]; });
          item.updatedAt = new Date().toISOString();
          item._dirty = true;
          return put(storeName, item).then(function () {
            emit("dataChanged", { entityType: cfg.entityType || storeName, op: "update", id: id });
            scheduleMetadataSync(storeName, id);
          });
        });
      });
    }

    /** Low-level merge function version (backward compat) */
    function updateEntityRaw(storeName, id, mergeFn) {
      return withLock(id, function () {
        return get(storeName, id).then(function (item) {
          if (!item) return;
          mergeFn(item);
          return put(storeName, item);
        });
      });
    }

    function updateSortOrders(storeName, entries) {
      return Promise.all(entries.map(function (e) {
        _entityStoreMap[e.id] = storeName;
        return withLock(e.id, function () {
          return get(storeName, e.id).then(function (item) {
            if (!item) return;
            item.sortOrder = e.sortOrder;
            item._dirty = true;
            return put(storeName, item);
          });
        }).catch(function (err) {
          console.error("[EntityStore] updateSortOrders partial failure:", e.id, err);
        });
      }));
    }

    function setInactive(storeName, id) {
      _entityStoreMap[id] = storeName;
      return withLock(id, function () {
        return get(storeName, id).then(function (item) {
          if (!item) return;
          item.isActive = false;
          item._dirty = true;
          return put(storeName, item);
        });
      });
    }

    function archiveEntity(storeName, id) {
      _entityStoreMap[id] = storeName;
      return setInactive(storeName, id).then(function () {
        var cfg = _registrations[storeName];
        emit("dataChanged", { entityType: cfg.entityType || storeName, op: "archive", id: id });
        syncArchiveToServer(storeName, id);
      });
    }

    // =========================================================
    // Content Management
    // =========================================================
    function saveContent(storeName, id, content) {
      _entityStoreMap[id] = storeName;
      return withLock(id, function () {
        return get(storeName, id).then(function (existing) {
          if (!existing) return;
          if (!content && !existing._serverUpdatedAt && !existing._pendingCreate) {
            console.warn("[EntityStore] Skipping empty content save for unconfirmed entity:", id);
            return;
          }
          var now = new Date().toISOString();
          existing.content = content;
          existing._contentDirtyAt = now;
          return put(storeName, existing).then(function () {
            scheduleContentSync(storeName, id);
          });
        });
      });
    }

    function getContent(storeName, id) {
      return get(storeName, id).then(function (record) {
        if (!record) return null;
        return record.content != null ? record.content : "";
      });
    }

    // =========================================================
    // Sync Utilities
    // =========================================================
    function stripLocalFields(obj) {
      var result = {};
      Object.keys(obj).forEach(function (k) {
        if (k.charAt(0) !== "_") result[k] = obj[k];
      });
      return result;
    }

    function withTimeout(promise, ms) {
      return new Promise(function (resolve, reject) {
        var timer = setTimeout(function () { reject(new Error("timeout")); }, ms);
        promise.then(function (v) { clearTimeout(timer); resolve(v); },
                     function (e) { clearTimeout(timer); reject(e); });
      });
    }

    function retryWithBackoff(fn, maxRetries) {
      maxRetries = maxRetries || 5;
      function attempt(n) {
        return fn().catch(function (err) {
          if (n >= maxRetries) {
            emit("syncError", { error: err });
            throw err;
          }
          var delay = Math.pow(2, n) * 1000;
          return new Promise(function (resolve) {
            setTimeout(resolve, delay);
          }).then(function () { return attempt(n + 1); });
        });
      }
      return attempt(0);
    }

    // =========================================================
    // Write Sync: IDB → Server
    // =========================================================
    function syncCreateToServer(storeName, id) {
      get(storeName, id).then(function (entity) {
        if (!entity || !entity._pendingCreate) return;
        var capturedUpdatedAt = entity.updatedAt;
        var cfg = _registrations[storeName];
        if (!cfg || !cfg.serverFns || !cfg.serverFns.add) return;
        var args = cfg.addServerArgs(entity);
        return retryWithBackoff(function () {
          return serverCall.apply(null, [cfg.serverFns.add].concat(args));
        }).then(function (result) {
          return withLock(id, function () {
            return get(storeName, id).then(function (latest) {
              if (!latest) return;
              latest._pendingCreate = false;
              latest._serverUpdatedAt = result.updatedAt;
              if (latest.updatedAt === capturedUpdatedAt) {
                latest._dirty = false;
              }
              return put(storeName, latest);
            });
          });
        });
      }).catch(function (err) {
        console.error("[EntityStore] syncCreateToServer failed:", storeName, id, err);
      });
    }

    function scheduleMetadataSync(storeName, id) {
      if (_metaDebounces[id]) clearTimeout(_metaDebounces[id]);
      _metaDebounces[id] = setTimeout(function () {
        delete _metaDebounces[id];
        syncMetadataToServer(storeName, id);
      }, 1000);
    }

    function syncMetadataToServer(storeName, id) {
      get(storeName, id).then(function (entity) {
        if (!entity) return;
        if (entity._pendingCreate) return;
        var capturedUpdatedAt = entity.updatedAt;
        var cfg = _registrations[storeName];
        if (!cfg || !cfg.serverFns || !cfg.serverFns.update) return;
        var clean = stripLocalFields(entity);
        delete clean.id;
        delete clean.createdAt;
        delete clean.content;
        return retryWithBackoff(function () {
          return serverCall(cfg.serverFns.update, id, clean);
        }).then(function (result) {
          if (!result || !result.updatedAt) return;
          return withLock(id, function () {
            return get(storeName, id).then(function (latest) {
              if (!latest) return;
              latest._serverUpdatedAt = result.updatedAt;
              if (latest.updatedAt === capturedUpdatedAt) {
                latest._dirty = false;
              }
              return put(storeName, latest);
            });
          });
        });
      }).catch(function (err) {
        console.error("[EntityStore] syncMetadataToServer failed:", storeName, id, err);
      });
    }

    function syncArchiveToServer(storeName, id) {
      get(storeName, id).then(function (entity) {
        if (!entity) return;
        if (entity._pendingCreate) return;
        var cfg = _registrations[storeName];
        if (!cfg || !cfg.serverFns || !cfg.serverFns.archive) return;
        return retryWithBackoff(function () {
          return serverCall(cfg.serverFns.archive, id);
        }).then(function () {
          return withLock(id, function () {
            return get(storeName, id).then(function (latest) {
              if (!latest) return;
              latest._dirty = false;
              return put(storeName, latest);
            });
          });
        });
      }).catch(function (err) {
        console.error("[EntityStore] syncArchiveToServer failed:", storeName, id, err);
      });
    }

    function scheduleContentSync(storeName, id) {
      if (_contentSyncDebounces[id]) clearTimeout(_contentSyncDebounces[id]);
      _contentSyncDebounces[id] = setTimeout(function () {
        delete _contentSyncDebounces[id];
        syncContentToServer(storeName, id);
      }, 30000);
    }

    function flushContentSync(storeName, id) {
      if (_contentSyncDebounces[id]) {
        clearTimeout(_contentSyncDebounces[id]);
        delete _contentSyncDebounces[id];
      }
      syncContentToServer(storeName, id);
    }

    function syncContentToServer(storeName, id) {
      get(storeName, id).then(function (entity) {
        if (!entity) return;
        if (entity._pendingCreate) return;
        if (!entity._contentDirtyAt) return;
        var cfg = _registrations[storeName];
        if (!cfg || !cfg.serverFns) return;
        var content = entity.content || "";
        var capturedDirtyAt = entity._contentDirtyAt;

        // Use custom contentSyncFn if provided, otherwise generic update
        var syncFn;
        if (cfg.contentSyncFn) {
          syncFn = function () { return cfg.contentSyncFn(id, content); };
        } else if (cfg.serverFns.update) {
          syncFn = function () { return serverCall(cfg.serverFns.update, id, { content: content }); };
        } else {
          return;
        }

        return retryWithBackoff(syncFn).then(function (result) {
          var serverUpdatedAt = result && result.updatedAt;
          return withLock(id, function () {
            return get(storeName, id).then(function (latest) {
              if (!latest) return;
              if (latest._contentDirtyAt === capturedDirtyAt) {
                latest._contentDirtyAt = null;
              }
              if (serverUpdatedAt) latest._serverUpdatedAt = serverUpdatedAt;
              return put(storeName, latest);
            });
          });
        });
      }).catch(function (err) {
        console.error("[EntityStore] syncContentToServer failed:", storeName, id, err);
      });
    }

    function scheduleReorderSync(storeName, args) {
      var state = _reorderState[storeName];
      if (!state) return;
      state.pending = args;
      if (_reorderDebounces[storeName]) clearTimeout(_reorderDebounces[storeName]);
      _reorderDebounces[storeName] = setTimeout(function () {
        delete _reorderDebounces[storeName];
        flushReorderSync(storeName);
      }, 5000);
    }

    function flushReorderSync(storeName) {
      var state = _reorderState[storeName];
      if (!state) return;
      if (state.saving) return;
      if (!state.pending) return;
      var args = state.pending;
      state.pending = null;
      state.saving = true;
      var cfg = _registrations[storeName];
      if (!cfg || !cfg.serverFns || !cfg.serverFns.reorder) {
        state.saving = false;
        return;
      }
      serverCall.apply(null, [cfg.serverFns.reorder].concat(args))
        .catch(function (err) {
          console.error("[EntityStore] reorder sync failed:", storeName, err);
        })
        .then(function () {
          state.saving = false;
          if (state.pending) flushReorderSync(storeName);
        });
    }

    function flushAllSyncs() {
      Object.keys(_metaDebounces).forEach(function (id) {
        clearTimeout(_metaDebounces[id]);
        delete _metaDebounces[id];
        var storeName = _entityStoreMap[id];
        if (storeName) syncMetadataToServer(storeName, id);
      });
      Object.keys(_contentSyncDebounces).forEach(function (id) {
        clearTimeout(_contentSyncDebounces[id]);
        delete _contentSyncDebounces[id];
        var storeName = _entityStoreMap[id];
        if (storeName) syncContentToServer(storeName, id);
      });
      Object.keys(_reorderState).forEach(function (sn) {
        if (_reorderDebounces[sn]) {
          clearTimeout(_reorderDebounces[sn]);
          delete _reorderDebounces[sn];
        }
        flushReorderSync(sn);
      });
    }

    // =========================================================
    // Read Sync: Server → IDB
    // =========================================================
    function mergeServerData(storeName, serverEntities) {
      return getAll(storeName).then(function (localEntities) {
        var localMap = {};
        localEntities.forEach(function (e) { localMap[e.id] = e; });
        var serverMap = {};
        serverEntities.forEach(function (e) { serverMap[e.id] = e; });

        var ops = [];

        // 1. Server only → insert into IDB
        serverEntities.forEach(function (se) {
          if (!localMap[se.id]) {
            se._serverUpdatedAt = se.updatedAt;
            se._contentDirtyAt = null;
            var pending = _pendingServerContent[se.id];
            if (pending) {
              se.content = pending.content;
              delete _pendingServerContent[se.id];
            } else {
              se.content = "";
            }
            ops.push(put(storeName, se));
          }
        });

        // 2. Local only
        localEntities.forEach(function (le) {
          if (!serverMap[le.id]) {
            if (!le._serverUpdatedAt) {
              ops.push(withLock(le.id, function () {
                return get(storeName, le.id).then(function (latest) {
                  if (!latest) return;
                  latest._pendingCreate = true;
                  latest._dirty = true;
                  if (latest.content == null) latest.content = "";
                  return put(storeName, latest);
                });
              }).then(function () {
                syncCreateToServer(storeName, le.id);
              }));
            } else {
              ops.push(remove(storeName, le.id));
            }
          }
        });

        // 3. Both exist
        serverEntities.forEach(function (se) {
          var le = localMap[se.id];
          if (!le) return;
          _entityStoreMap[se.id] = storeName;
          if (!le._dirty) {
            var merged = {};
            Object.keys(se).forEach(function (k) { merged[k] = se[k]; });
            Object.keys(le).forEach(function (k) {
              if (k.charAt(0) === "_" || k === "content") {
                merged[k] = le[k];
              }
            });
            merged._serverUpdatedAt = se.updatedAt;
            merged._dirty = false;
            ops.push(put(storeName, merged));
          } else {
            ops.push(withLock(se.id, function () {
              return get(storeName, se.id).then(function (latest) {
                if (!latest) return;
                latest._serverUpdatedAt = se.updatedAt;
                return put(storeName, latest);
              });
            }));
            scheduleMetadataSync(storeName, se.id);
          }
        });

        return Promise.all(ops);
      });
    }

    function requeueDirtyRecords(storeName) {
      getAll(storeName).then(function (entities) {
        entities.forEach(function (entity) {
          _entityStoreMap[entity.id] = storeName;
          if (entity._pendingCreate) {
            syncCreateToServer(storeName, entity.id);
          } else if (entity._dirty) {
            scheduleMetadataSync(storeName, entity.id);
          }
          if (entity._contentDirtyAt) {
            scheduleContentSync(storeName, entity.id);
          }
        });
      }).catch(function (err) {
        console.warn("[EntityStore] requeueDirtyRecords error:", storeName, err);
      });
    }

    // =========================================================
    // Content Conflict Resolution
    // =========================================================
    function applyServerContent(storeName, id, content, serverTs) {
      return withLock(id, function () {
        return get(storeName, id).then(function (entity) {
          if (!entity) return;
          entity.content = content;
          entity._contentDirtyAt = null;
          entity._serverUpdatedAt = serverTs;
          return put(storeName, entity);
        });
      });
    }

    function resolveContentConflict(storeName, id, serverResult) {
      console.log("[EntityStore] resolveContentConflict:", id, "serverResult:", serverResult == null ? "null" : JSON.stringify({ contentLen: (serverResult.content || "").length, updatedAt: serverResult.updatedAt }));
      if (serverResult == null) {
        return get(storeName, id).then(function (entity) {
          console.log("[EntityStore] serverResult null, entity:", entity ? "exists, content=" + JSON.stringify((entity.content || "").slice(0, 40)) : "null");
          if (entity && entity.content) {
            return { useServer: false };
          }
          return null;
        });
      }

      var serverContent = serverResult.content || "";
      var serverTs = serverResult.updatedAt || "";

      return get(storeName, id).then(function (entity) {
        if (!entity) {
          console.log("[EntityStore] entity not in IDB, serverContent len:", serverContent.length);
          if (!serverContent) return { useServer: false };
          _pendingServerContent[id] = { content: serverContent, serverTs: serverTs };
          return { useServer: true, content: serverContent };
        }

        var localContent = entity.content || "";
        console.log("[EntityStore] both exist — local:", localContent.length, "server:", serverContent.length, "_contentDirtyAt:", entity._contentDirtyAt);

        if (localContent === serverContent) {
          return applyServerContent(storeName, id, localContent, serverTs).then(function () {
            return { useServer: false };
          });
        }

        if (entity._contentDirtyAt) {
          scheduleContentSync(storeName, id);
          return Promise.resolve({ useServer: false });
        }

        return applyServerContent(storeName, id, serverContent, serverTs).then(function () {
          return { useServer: true, content: serverContent };
        });
      });
    }

    function resolveWithServer(storeName, id) {
      var cfg = _registrations[storeName];
      if (!cfg || !cfg.serverFns || !cfg.serverFns.getContent) {
        return Promise.resolve(null);
      }
      function attempt() {
        return withTimeout(serverCall(cfg.serverFns.getContent, id), 30000)
          .then(function (serverResult) {
            return resolveContentConflict(storeName, id, serverResult);
          });
      }
      return attempt().catch(function (err) {
        console.warn("[EntityStore] resolveWithServer attempt 1 failed, retrying:", id, err);
        return attempt();
      }).catch(function (err) {
        console.error("[EntityStore] resolveWithServer failed after retry:", id, err);
        return null;
      });
    }

    // =========================================================
    // Public API
    // =========================================================
    return {
      register: register,
      init: init,
      on: on,
      emit: emit,
      get: get,
      getAll: getAll,
      put: put,
      remove: remove,
      getByIndex: getByIndex,
      withLock: withLock,
      addEntity: addEntity,
      updateEntityFields: updateEntityFields,
      updateEntityRaw: updateEntityRaw,
      updateSortOrders: updateSortOrders,
      setInactive: setInactive,
      archiveEntity: archiveEntity,
      saveContent: saveContent,
      getContent: getContent,
      flushContentSync: flushContentSync,
      flushAllSyncs: flushAllSyncs,
      syncArchiveToServer: syncArchiveToServer,
      scheduleReorderSync: scheduleReorderSync,
      resolveWithServer: resolveWithServer,
      mergeServerData: mergeServerData,
      requeueDirtyRecords: requeueDirtyRecords,
    };
  })();
</script>
